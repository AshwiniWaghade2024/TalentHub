spring.application.name=talenthub-backend

# Security & JWT
talenthub.app.jwtSecret=${TALENT_HUB_JWT_SECRET:9H/am0ZcnV/z433Lb8Kzy9Sztrg/mPbERIFpsf1TZfeHOSCuz1ng1sDFa/H0mpMCmSHg3caUUNfTj5kLF3awwg==}
talenthub.app.jwtExpirationMs=${TALENTHUB_JWT_EXPIRATION:86400000}

# PostgreSQL Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.application.name=talenthub-backend

# Security & JWT (From .env file)
talenthub.app.jwtSecret=${TALENT_HUB_JWT_SECRET}
talenthub.app.jwtExpirationMs=${TALENTHUB_JWT_EXPIRATION}

# 🚀 Main Database - PostgreSQL (From .env file)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional: H2 Console (Can still be used for quick testing if needed)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
